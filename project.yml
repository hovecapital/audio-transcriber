name: MeetingRecorder
options:
  bundleIdPrefix: com.meetingrecorder
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: "Meeting Recorder"

targets:
  MeetingRecorder:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: AppIcon.icns
        type: file
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: MeetingRecorder.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingrecorder.app
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: MeetingRecorder.entitlements
      properties:
        com.apple.security.device.audio-input: true
    info:
      path: Info.plist
      properties:
        CFBundleIconFile: AppIcon
        LSUIElement: true
        NSMicrophoneUsageDescription: "Meeting Recorder needs microphone access to record your voice during meetings."
        NSAppleEventsUsageDescription: "Meeting Recorder needs to control other applications to capture system audio."
        NSScreenCaptureUsageDescription: "Meeting Recorder needs screen recording access to capture system audio from meetings."
